server:
  port: 2333
  address: 0.0.0.0

lavalink:
  plugins:
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.18.0"
      snapshot: false
    - dependency: "com.github.topi314.lavasrc:lavasrc-plugin:4.4.1"
      repository: "https://maven.lavalink.dev/releases"
      snapshot: false
  
  server:
    password: "LkJhGfDsA19181716"
    sources:
      youtube: false
      bandcamp: true
      soundcloud: true
      twitch: true
      vimeo: true
      http: true
      local: false
    filters:
      volume: true
      equalizer: true
      karaoke: true
      timescale: true
      tremolo: true
      vibrato: true
      distortion: true
      rotation: true
      channelMix: true
      lowPass: true
    bufferDurationMs: 400
    frameBufferDurationMs: 5000
    opusEncodingQuality: 10
    resamplingQuality: MEDIUM
    trackStuckThresholdMs: 10000
    useSeekGhosting: true
    youtubePlaylistLoadLimit: 6
    playerUpdateInterval: 5
    youtubeSearchEnabled: true
    soundcloudSearchEnabled: true
    gc-warnings: true

plugins:
  youtube:
    enabled: true
    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true
    clients:
      - ANDROID_VR
      - TVHTML5_SIMPLY
    oauth:
      enabled: false  # Disable broken OAuth
    pot:
      enabled: false

  lavasrc:
    providers:
      - "ytsearch:\"%ISRC%\""
      - "ytsearch:%QUERY%"
      - "scsearch:%QUERY%"
      - "amsearch:%QUERY%"
    sources:
      youtube: true  # Enable LavaSrc YouTube as backup
      spotify: false
      applemusic: true
      deezer: false
    youtube:
      countryCode: "US"
    applemusic:
      countryCode: "US"

logging:
  level:
    root: INFO
    lavalink: INFO
  file:
    path: ./logs/
