server:
  port: 2333
  address: 0.0.0.0

lavalink:
  plugins:
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.18.0"
      snapshot: false
    - dependency: "com.github.topi314.lavasrc:lavasrc-plugin:4.4.1"
      repository: "https://maven.lavalink.dev/releases"
      snapshot: false
  
  server:
    password: "LkJhGfDsA19181716"
    sources:
      youtube: false  # Disabled built-in (using plugin instead)
      bandcamp: true
      soundcloud: true
      twitch: true
      vimeo: true
      http: true
      local: false
    filters:
      volume: true
      equalizer: true
      karaoke: true
      timescale: true
      tremolo: true
      vibrato: true
      distortion: true
      rotation: true
      channelMix: true
      lowPass: true
    bufferDurationMs: 400
    frameBufferDurationMs: 5000
    opusEncodingQuality: 10
    resamplingQuality: MEDIUM
    trackStuckThresholdMs: 10000
    useSeekGhosting: true
    youtubePlaylistLoadLimit: 6
    playerUpdateInterval: 5
    youtubeSearchEnabled: true
    soundcloudSearchEnabled: true
    gc-warnings: true

plugins:
  youtube:
    enabled: true
    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true
    clients:
      - MUSIC
      - WEB
      - WEBEMBEDDED
      - ANDROID_VR
      - TV
      - TVHTML5_SIMPLY
    oauth:
      enabled: false
      skipInitialization: false

  lavasrc:
    providers:
      - "ytsearch:\"%ISRC%\""  # YouTube fallback
      - "ytsearch:%QUERY%"     # YouTube search
      - "amsearch:%QUERY%"     # Apple Music search
    sources:
      spotify: false        # DISABLED - Requires Premium now
      applemusic: true      # ENABLED
      deezer: false
    applemusic:
      countryCode: "US"     # Change to your country if needed
      playlistLoadLimit: 6
      albumLoadLimit: 6

logging:
  level:
    root: INFO
    lavalink: INFO
  file:
    path: ./logs/
