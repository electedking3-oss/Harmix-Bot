server:
  port: 2333
  address: 0.0.0.0

lavalink:
  plugins:
    # REMOVED: YouTube plugin completely
    - dependency: "com.github.topi314.lavasrc:lavasrc-plugin:4.4.1"
      repository: "https://maven.lavalink.dev/releases"
      snapshot: false
  
  server:
    password: "LkJhGfDsA19181716"
    sources:
      youtube: false
      bandcamp: true
      soundcloud: true  # Keep native SoundCloud
      twitch: false
      vimeo: false
      http: true
      local: false
    filters:
      volume: true
      equalizer: true
      karaoke: true
      timescale: true
      tremolo: true
      vibrato: true
      distortion: true
      rotation: true
      channelMix: true
      lowPass: true
    bufferDurationMs: 400
    frameBufferDurationMs: 5000
    opusEncodingQuality: 10
    resamplingQuality: MEDIUM
    trackStuckThresholdMs: 10000
    useSeekGhosting: true
    youtubePlaylistLoadLimit: 6
    playerUpdateInterval: 5
    youtubeSearchEnabled: false  # Disabled
    soundcloudSearchEnabled: true  # Keep
    gc-warnings: true

plugins:
  # REMOVED: YouTube section completely
  lavasrc:
    providers:
      - "scsearch:%QUERY%"      # SoundCloud search
      - "amsearch:%QUERY%"      # Apple Music search
    sources:
      spotify: false
      applemusic: true         # Apple Music enabled
      deezer: false
    applemusic:
      countryCode: "US"
      playlistLoadLimit: 6
      albumLoadLimit: 6

logging:
  level:
    root: INFO
    lavalink: INFO
  file:
    path: ./logs/
